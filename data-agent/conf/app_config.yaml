logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: localhost
  port: 3306
  user: ethan
  password: <your-mysql-password>
  database: meta

db_dw:
  host: localhost
  port: 3306
  user: ethan
  password: <your-mysql-password>
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

#embedding:
#  host: localhost
#  port: 8081
#  model: BAAI/bge-large-zh-v1.5

embedding:
  provider: openai_compatible
  model: text-embedding-v4
  api_key: <your-dashscope-api-key>
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  dimensions: 1024

es:
  host: localhost
  port: 9200
  index_name: data_agent


llm:
  model_name: glm-5-2-260617
  api_key: <your-llm-api-key>
  base_url: https://ark.cn-beijing.volces.com/api/v3

query_execution:
  max_rows: 500
  timeout_ms: 10000
  max_result_bytes: 1048576
